default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://postgres:postgres@localhost/expense_tracker_development") %>

test:
  <<: *default
  database: expense_tracker_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>